<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
<body>

    <section class="operators">
        <div class="specials-ops">
            <button>AC</button>
            <button>DEL</button>
            <button>%</button>
            <div class="main-ops">
                <button>/</button>
            </div>
        </div>
        <div class="num1">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <div class="main-ops">
                <button>*</button>
            </div>
        </div>

        <div class="num2">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <div class="main-ops">
                <button>-</button>
            </div>
        </div>

        <div class="num3">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <div class="main-ops">
                <button>+</button>
            </div>
        </div>
        <div class="num4">
            <button>0</button>
            <button>.</button>
            <div class="main-ops">
                <button>=</button>
            </div>
        </div>


    </section>
    
</body>
</html>
