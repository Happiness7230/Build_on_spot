<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        body{
            background-color: aqua;
        }
.operators{
    padding-left: 500px;
}




.sign{
   
    display: flex;
    background-color: black;
    text-align: center;
    width: 280px;
    gap: 7px;
    padding: 10px 20px;
}

.sign1{
    display: flex;
     gap: 7px;
    background-color: black;
    text-align: center;
    width: 280px;
    padding: 10px 20px;
  
}
.sign2{
    display: flex;
     gap: 7px;
    background-color: black;
    text-align: center;
    width: 280px;
    padding: 10px 20px;
}
.sign3{
    display: flex;
     gap: 7px;
    background-color: black;
    text-align: center;
    width: 280px;
    padding: 10px 20px;
}
.sign4{
    display: flex;
     gap: 7px;
    background-color: black;
    text-align: center;
    width: 280px;
    padding: 10px 20px;
     border-radius: 0px 0px 20px 20px;
}
.specials-ops{
    display: flex;
    gap: 8px;
    color: grey;
    padding: 3px;
}
.specials-ops button{
    background-color: grey;
}

.main-ops button{
    background-color: #f79A09;
    color: white;
}



.num1{
    display: flex;
    gap: 8px;
    color: grey;
    padding: 3px;
}

.num1 button{
    background-color: #313131;
    color: white;
    font-size: 22px;
}

.num2{
    display: flex;
    gap: 8px;
    color: grey;
    padding: 3px;
}

.num2 button{
    background-color: #313131;
    color: white;
    font-size: 22px;
}

.num3{
    display: flex;
    gap: 8px;
    color: grey;
    padding: 3px;
}

.num3 button{
    background-color: #313131;
    color: white;
    font-size: 22px;
}

.num4{
    display: flex;
    gap: 8px;
    color: grey;
    padding: 3px;
}
.num4 button{
    background-color: #313131;
    color: white;
    font-size: 22px;
}


.num4>.zero{
    width: 130px;
    border-radius: 30px;
}

button{
    width:60px;
    height:60px ;
    border-radius: 50%;

}

.main-ops{
    color:white;
}

/* textarea{
    resize: none;
    width: 314px;
} */

input{
    width: 316px;
    height: 70px;
    background-color: black;
    border: none;
    font-size: 60px;
     border-radius: 20px 20px 0px 0px;
}

input::placeholder {
    padding-left: 250px;
}




    </style>
</head>
<body>
<!-- 
    <textarea name="" id="" placeholder="0"></textarea> -->
   
    <section class="operators">
    <input type="text" placeholder="0">
        <div class="sign">
            <div class="specials-ops">
                <button>AC</button>
                <button>DEL</button>
                <button>%</button>
            </div>
            <div class="main-ops">
                <button>/</button>
            </div>
        </div>

        <div class="sign1">
            <div class="num1">
                <button>7</button>
                <button>8</button>
                <button>9</button>
            </div>
            <div class="main-ops">
                <button>*</button>
            </div>
        </div>


        <div class="sign2">
            <div class="num2">
                <button>4</button>
                <button>5</button>
                <button>6</button>
            </div>
            <div class="main-ops">
                <button>-</button>
            </div>
        </div>

        <div class="sign3">
            <div class="num3">
                <button>1</button>
                <button>2</button>
                <button>3</button>
            </div>
            <div class="main-ops">
                <button>+</button>
            </div>
        </div>

        <div class="sign4">
            <div class="num4">
                <button class="zero">0</button>
                <button>.</button>
            </div>
            <div class="main-ops">
                <button>=</button>
            </div>
        </div>


    </section>
    
</body>
</html>
